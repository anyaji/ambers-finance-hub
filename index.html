<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7b5d3" />
  <title>Amber's Finance Hub</title>
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Amber's Hub" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Animated pastel background -->
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
    <span class="orb orb-4"></span>
  </div>

  <!-- Floating money / sparkles / coin-burst layer -->
  <div id="fx-layer" class="fx-layer" aria-hidden="true"></div>

  <!-- App mounts here -->
  <div id="app"></div>

  <!-- Floating bottom navigation -->
  <nav id="tabbar" class="tabbar" aria-label="Main navigation"></nav>

  <!-- Confetti canvas overlay -->
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  <!-- Toast + modal hosts -->
  <div id="toast-host" class="toast-host" aria-live="polite"></div>
  <div id="modal-host"></div>

  <!-- Tiny confetti lib (CDN, ~6kb). Falls back gracefully if offline. -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" defer></script>
  <!-- Lottie player (CDN). Only used if you add .json files to assets/lottie/. -->
  <script src="https://cdn.jsdelivr.net/npm/lottie-web@5.12.2/build/player/lottie_light.min.js" defer></script>

  <!-- App scripts (classic, no build step — works via file:// and GitHub Pages) -->
  <script src="js/store.js" defer></script>
  <script src="js/engine.js" defer></script>
  <script src="js/fx.js" defer></script>
  <script src="js/lottie.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/github.js" defer></script>
  <script src="js/views.js" defer></script>
  <script src="js/games.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
